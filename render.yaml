# Render blueprint - deploys VeriRAG as a single Docker web service.
# Render injects $PORT (the Dockerfile honours it), runs Qdrant embedded
# in-process (QDRANT_URL empty), and auto-seeds the demo corpus on boot.
services:
  - type: web
    name: verirag
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false          # set this in the Render dashboard (secret)
      - key: QDRANT_URL
        value: ""            # empty -> embedded Qdrant
      - key: AUTO_SEED
        value: "true"
